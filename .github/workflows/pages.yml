name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build deploy artifact
        run: |
          mkdir -p dist
          touch dist/.nojekyll

          # Gallery root
          cp index.html dist/index.html

          # Every presentation folder: any non-hidden, non-underscore directory
          # that contains an index.html is treated as a presentation and included.
          # Adding a new deck requires no workflow changes — just push the folder.
          echo "Presentations included in deploy:"
          for dir in */; do
            folder="${dir%/}"
            if [[ "$folder" != _* ]] && [[ "$folder" != .* ]] && [ -f "$folder/index.html" ]; then
              cp -r "$folder" "dist/$folder"
              echo "  ✓ $folder"
            fi
          done

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
